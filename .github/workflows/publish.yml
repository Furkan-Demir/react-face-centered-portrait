name: Publish to npm

# Fires only when a version tag is pushed (e.g. via `npm version patch &&
# git push --follow-tags`), so the published npm version always corresponds
# to an exact, reviewable commit in this repo — never a manual local publish.
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # enables npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      # prepublishOnly (typecheck + build) runs automatically as part of `npm publish`.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
